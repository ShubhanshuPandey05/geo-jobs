services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: geojobs-postgres
    environment:
      POSTGRES_DB: geojobs
      POSTGRES_USER: geojobs
      POSTGRES_PASSWORD: geojobs_secret_123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geojobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geojobs-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Meilisearch (fast fuzzy search engine) ───────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: geojobs-meilisearch
    environment:
      MEILI_MASTER_KEY: geojobs_meili_master_key_123
      MEILI_ENV: development
      MEILI_LOG_LEVEL: INFO
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Scraper Worker (BullMQ + Playwright) ───────────
  scraper-worker:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: geojobs-scraper
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: geojobs
      DB_USER: geojobs
      DB_PASSWORD: geojobs_secret_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SCRAPER_CONCURRENCY: 5
      MAX_BROWSERS: 3
      NODE_ENV: production
      DIRECT_MODE: "false"
      LOG_LEVEL: info
    command: ["node", "src/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - scraper-logs:/app/logs
      - scraper-screenshots:/app/screenshots
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  meilidata:
  scraper-logs:
  scraper-screenshots:
